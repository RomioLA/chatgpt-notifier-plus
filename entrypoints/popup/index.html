<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <label>Volume</label>
      <div class="value-display"><span id="volumeValue">50</span>%</div>
    </div>
    <div class="slider-container">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01">
    </div>
    <div class="toggle-row">
      <label for="systemNotifyToggle">System Notification</label>
      <label class="switch">
        <input type="checkbox" id="systemNotifyToggle">
        <span class="switch-slider"></span>
      </label>
    </div>
    <div class="hint-text">Show a desktop alert when ChatGPT finishes responding.</div>
  </div>
  <script type="module" src="./App.ts"></script>
</body>
</html>
